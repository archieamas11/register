<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="admin-css.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="../logo/logo-simple.png" type="image/x-icon">
    <script src="admin-js.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteIt!</title>
</head>
<body>


    <nav>
        <div class="chosen">

        </div>
        <ul class="navlist">
            <li>
                <img src="../logo/logo-simple-wh.png" class="logosimple">
                <img src="../logo/logo-wh-ws.png" class="logofull">
            </li>
            <li>
                <a href="#">
                    <i class='bx bx-note'></i>
                    <span class="nav">All Notes</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bx-bookmark' ></i>
                    <span class="nav">Favorites</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bx-box' ></i>
                    <span class="nav">Archives</span>
                </a>
            </li>

            <li>
                <a href="../landingpg/landing-html.html" id="logout">
                    <i class='bx bx-log-out-circle' ></i>
                    <span class="nav">Logout</span>
                </a>
            </li>

            <li>
                <div class="profile">
                    <img src="profile.jpg">
                    <p><span>Hi Joshua!</span><br>Welcome back.</p>
                </div>
            </li>
        </ul>
    </nav>

    <div class="adminbg"></div>

    <div class="header">
        <div class="sideheader">
            <div class="search-container">
                <input type="text" placeholder="Search..." class="search-input">
                <button type="submit" class="search-button">
                    <i class='bx bx-search'></i>
                </button>
            </div>
            <button type="button" class="add-button">
                <img src="icons8-add-50.png">
            </button>
        </div>
    </div>

    <div class="wrapper">
        <div class="titlecontent">
            <h1>All Notes</h1>
            <p>Welcome Joshua! Here are your stored notes to keep track of your thoughts and tasks with ease. </p>
            <button type="button" class="addnote">
                Add New Note
            </button>
        </div>

        <div class="notes">

        </div>
    </div>

    <div class="blur-background"></div>
    <div class="form-modal">
        <div class="form-content">
            <h2>Add a New Note</h2>
            <label for="note-title">Title:</label>
            <input type="text" id="note-title" placeholder="Enter note title">
            
            <label for="note-content">Content:</label>
            <textarea id="note-content" rows="5" placeholder="Enter note content"></textarea>
            
            <div class="form-buttons">
                <button type="button" class="close-button">Close</button>
                <button type="button" class="done-button">Done</button>
            </div>
        </div>
    </div>
</body>
</html>
