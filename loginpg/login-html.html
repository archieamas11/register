<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login-css.css" />
    <link rel="icon" href="../logo/logo-simple.png" type="image/x-icon" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to NoteIt!</title>
  </head>
  <body>
    <div class="header">
      <img src="../logo/logo-bs-os.png" />
      <ul>
        <li><a href="../landingpg/landing-html.html">HOME</a></li>
        <li><a href="../registerpg/register-html.html">REGISTER</a></li>
        <li><a href="">SIGN IN</a></li>
      </ul>
    </div>

    <div class="wrapper">
      <div class="intro">
        <img src="../logo/logo-bs-os.png" />

        <form class="login-form">
          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </div>
          <div class="options-group">
            <div class="remember-me">
              <input type="checkbox" id="remember" name="remember" />
              <label for="remember">Sign me in</label>
            </div>
            <div class="forgot-password">
              <a href="#">Forgot Password?</a>
            </div>
          </div>

          <a href="../adminpg/admin-html.html">
            <button type="button" class="wipe-button">
              <span>SIGN IN</span>
            </button>
          </a>
        </form>
      </div>
    </div>
  </body>
</html>
